{% extends 'base.html' %}

{% block title %}Logowanie{% endblock %}

{% block content %}
<div class="form-card">
    <h2>Zaloguj sie</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="username" class="form-label">Nazwa uzytkownika</label>
            <input type="text" name="username" id="username" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Haslo</label>
            <input type="password" name="password" id="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary-green w-100">Zaloguj sie</button>
    </form>
    <p class="text-center mt-3 mb-0">
        Nie masz konta? <a href="{% url 'recipes:register' %}">Zarejestruj sie</a>
    </p>
</div>
{% endblock %}
